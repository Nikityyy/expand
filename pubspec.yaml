name: expand
description: "Expand - A real-world exploration game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Location / GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # State management
  provider: ^6.1.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts
  google_fonts: ^6.2.1

  # HTTP (Nominatim API)
  http: ^1.2.1

  # Geospatial math
  geodesy: ^0.9.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/expand-favicon-ios.webp"
    background_color: "#0F5838"
    theme_color: "#0F5838"
  theme_color: "#0F5838" 
  image_path: "assets/expand-favicon-ios.webp"
  adaptive_icon_background: "#F0F2F5"
  adaptive_icon_foreground: "assets/expand-favicon-android.webp"
  remove_alpha_ios: true 
  background_color_ios: "#F0F2F5"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
